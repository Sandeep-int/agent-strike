name: Agent Strike Security Gate
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  security-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pytest bandit pip-audit
          pip install -r requirements.txt

      - name: Bandit Scan
        run: bandit -r attacks/ core/ executor/ reporter/ scripts/ config.py main.py -ll

      - name: pip-audit
        run: pip-audit

      - name: Run Tests
        env:
          AGENT_STRIKE_INTERNAL_KEY: ${{ secrets.AGENT_STRIKE_INTERNAL_KEY }}
          AGENT_SHIELD_URL: ${{ secrets.AGENT_SHIELD_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_TABLE_NAME: agentstrikeresults
        run: python -m pytest tests/ -v --tb=short
