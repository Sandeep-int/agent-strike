name: Security Gate

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  security-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bandit scan
        run: bandit -r attacks/ core/ executor/ reporter/ scripts/ config.py main.py -ll

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
        env:
          AGENT_STRIKE_INTERNAL_KEY: ${{ secrets.AGENT_STRIKE_INTERNAL_KEY }}
          AGENT_SHIELD_URL: ${{ secrets.AGENT_SHIELD_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_TABLE_NAME: agentstrikeresults
